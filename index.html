<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="icon" href="favicon.ico?v=2" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico?v=2" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Full-screen Google embed -->
    <iframe id="googleFrame" src="https://www.google.com/webhp?igu=1&gws_rd=ssl" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>

    <!-- Selection Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 class="modal-title">Choose Your Experience</h2>
            <p class="modal-subtitle">Select where you'd like to go</p>
            <div class="options-container">
                <div class="option-card" id="anonyloadrCard">
                    <div class="option-icon anonyloadr">🔒</div>
                    <h3 class="option-title">AnonyLoadr</h3>
                    <p class="option-description">Access the web anonymously with proxies. Browse without leaving traces.</p>
                </div>
                <div class="option-card" id="chatterCard">
                    <div class="option-icon chatter">💬</div>
                    <h3 class="option-title">Chatter</h3>
                    <p class="option-description">Connect with friends through messages, group chats, and servers!</p>
                </div>
            </div>
            <button class="modal-close" id="modalClose">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
